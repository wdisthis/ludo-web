<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <!-- Definitions for Reusable Assets & Depth Gradients -->
  <defs>
    <!-- Soft Drop Shadow for Home Base Ceramic Cards -->
    <filter id="base-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>

    <!-- Ceramic Card Subtle Gradient -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <!-- Carved Socket Pockets Subtle Gradient -->
    <linearGradient id="socket-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Player Premium Gradients -->
    <!-- Green -->
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    
    <!-- Yellow -->
    <linearGradient id="yellow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Red -->
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>

    <!-- Blue -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Glossy Glass Shield Fill -->
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f1f5f9" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Hollow Shield Safe Zone Checkpoint (stroke outline only, fill=none) -->
    <g id="safe-shield">
      <!-- Shadow outline stroke offset -->
      <polygon points="8,7 20,10 32,7 32,20 20,33 8,20" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linejoin="round" transform="translate(0, 1.5)" opacity="0.2"/>
      <!-- Glossy semi-transparent body -->
      <polygon points="8,7 20,10 32,7 32,20 20,33 8,20" fill="url(#shield-fill)"/>
      <!-- Crisp solid shield outline (inherits stroke color from parent use) -->
      <polygon points="8,7 20,10 32,7 32,20 20,33 8,20" fill="none" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- Background Base -->
  <rect x="0" y="0" width="600" height="600" fill="#ffffff" stroke="#1e293b" stroke-width="4"/>

  <!-- Full Track Grid Cells -->
  <!-- Top Grid Group (Yellow Path - Rich Amber Brown Strokes) -->
  <g fill="#ffffff" stroke="#78350f" stroke-width="1.5">
    <rect x="240" y="0" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="0" width="40" height="40" fill="#ffffff"/>
    <rect x="320" y="0" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="40" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="40" width="40" height="40" fill="url(#yellow-grad)"/>
    <rect x="320" y="40" width="40" height="40" fill="url(#yellow-grad)"/>
    <rect x="240" y="80" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="80" width="40" height="40" fill="url(#yellow-grad)"/>
    <rect x="320" y="80" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="120" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="120" width="40" height="40" fill="url(#yellow-grad)"/>
    <rect x="320" y="120" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="160" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="160" width="40" height="40" fill="url(#yellow-grad)"/>
    <rect x="320" y="160" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="200" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="200" width="40" height="40" fill="url(#yellow-grad)"/>
    <rect x="320" y="200" width="40" height="40" fill="#ffffff"/>
  </g>

  <!-- Left Grid Group (Green Path - Deep Forest Green Strokes) -->
  <g fill="#ffffff" stroke="#14532d" stroke-width="1.5">
    <rect x="0" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="40" y="240" width="40" height="40" fill="url(#green-grad)"/>
    <rect x="80" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="120" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="160" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="200" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="0" y="280" width="40" height="40" fill="#ffffff"/>
    <rect x="40" y="280" width="40" height="40" fill="url(#green-grad)"/>
    <rect x="80" y="280" width="40" height="40" fill="url(#green-grad)"/>
    <rect x="120" y="280" width="40" height="40" fill="url(#green-grad)"/>
    <rect x="160" y="280" width="40" height="40" fill="url(#green-grad)"/>
    <rect x="200" y="280" width="40" height="40" fill="url(#green-grad)"/>
    <rect x="0" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="40" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="80" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="120" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="160" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="200" y="320" width="40" height="40" fill="#ffffff"/>
  </g>

  <!-- Bottom Grid Group (Red Path - Rich Maroon Strokes) -->
  <g fill="#ffffff" stroke="#7f1d1d" stroke-width="1.5">
    <rect x="240" y="360" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="360" width="40" height="40" fill="url(#red-grad)"/>
    <rect x="320" y="360" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="400" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="400" width="40" height="40" fill="url(#red-grad)"/>
    <rect x="320" y="400" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="440" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="440" width="40" height="40" fill="url(#red-grad)"/>
    <rect x="320" y="440" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="480" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="480" width="40" height="40" fill="url(#red-grad)"/>
    <rect x="320" y="480" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="520" width="40" height="40" fill="url(#red-grad)"/>
    <rect x="280" y="520" width="40" height="40" fill="url(#red-grad)"/>
    <rect x="320" y="520" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="560" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="560" width="40" height="40" fill="#ffffff"/>
    <rect x="320" y="560" width="40" height="40" fill="#ffffff"/>
  </g>

  <!-- Right Grid Group (Blue Path - Deep Navy Blue Strokes) -->
  <g fill="#ffffff" stroke="#172554" stroke-width="1.5">
    <rect x="360" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="400" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="440" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="480" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="520" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="560" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="360" y="280" width="40" height="40" fill="url(#blue-grad)"/>
    <rect x="400" y="280" width="40" height="40" fill="url(#blue-grad)"/>
    <rect x="440" y="280" width="40" height="40" fill="url(#blue-grad)"/>
    <rect x="480" y="280" width="40" height="40" fill="url(#blue-grad)"/>
    <rect x="520" y="280" width="40" height="40" fill="url(#blue-grad)"/>
    <rect x="560" y="280" width="40" height="40" fill="#ffffff"/>
    <rect x="360" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="400" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="440" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="480" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="520" y="320" width="40" height="40" fill="url(#blue-grad)"/>
    <rect x="560" y="320" width="40" height="40" fill="#ffffff"/>
  </g>

  <!-- Player Bases (Home Yards) -->
  <!-- Green Base (Top-Left - Forest Green Borders) -->
  <g stroke="#14532d" stroke-width="1.5">
    <rect x="0" y="0" width="240" height="240" fill="url(#green-grad)"/>
    <rect x="40" y="40" width="160" height="160" rx="16" fill="url(#card-grad)" filter="url(#base-shadow)"/>
    
    <circle cx="80" cy="80" r="22" fill="url(#socket-grad)"/>
    <circle cx="80" cy="80" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="160" cy="80" r="22" fill="url(#socket-grad)"/>
    <circle cx="160" cy="80" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="80" cy="160" r="22" fill="url(#socket-grad)"/>
    <circle cx="80" cy="160" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="160" cy="160" r="22" fill="url(#socket-grad)"/>
    <circle cx="160" cy="160" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
  </g>

  <!-- Yellow Base (Top-Right - Rich Amber Brown Borders) -->
  <g stroke="#78350f" stroke-width="1.5">
    <rect x="360" y="0" width="240" height="240" fill="url(#yellow-grad)"/>
    <rect x="400" y="40" width="160" height="160" rx="16" fill="url(#card-grad)" filter="url(#base-shadow)"/>
    
    <circle cx="440" cy="80" r="22" fill="url(#socket-grad)"/>
    <circle cx="440" cy="80" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="520" cy="80" r="22" fill="url(#socket-grad)"/>
    <circle cx="520" cy="80" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="440" cy="160" r="22" fill="url(#socket-grad)"/>
    <circle cx="440" cy="160" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="520" cy="160" r="22" fill="url(#socket-grad)"/>
    <circle cx="520" cy="160" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
  </g>

  <!-- Red Base (Bottom-Left - Rich Maroon Borders) -->
  <g stroke="#7f1d1d" stroke-width="1.5">
    <rect x="0" y="360" width="240" height="240" fill="url(#red-grad)"/>
    <rect x="40" y="400" width="160" height="160" rx="16" fill="url(#card-grad)" filter="url(#base-shadow)"/>
    
    <circle cx="80" cy="440" r="22" fill="url(#socket-grad)"/>
    <circle cx="80" cy="440" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="160" cy="440" r="22" fill="url(#socket-grad)"/>
    <circle cx="160" cy="440" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="80" cy="520" r="22" fill="url(#socket-grad)"/>
    <circle cx="80" cy="520" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="160" cy="520" r="22" fill="url(#socket-grad)"/>
    <circle cx="160" cy="520" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
  </g>

  <!-- Blue Base (Bottom-Right - Deep Navy Blue Borders) -->
  <g stroke="#172554" stroke-width="1.5">
    <rect x="360" y="360" width="240" height="240" fill="url(#blue-grad)"/>
    <rect x="400" y="400" width="160" height="160" rx="16" fill="url(#card-grad)" filter="url(#base-shadow)"/>
    
    <circle cx="440" cy="440" r="22" fill="url(#socket-grad)"/>
    <circle cx="440" cy="440" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="520" cy="440" r="22" fill="url(#socket-grad)"/>
    <circle cx="520" cy="440" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="440" cy="520" r="22" fill="url(#socket-grad)"/>
    <circle cx="440" cy="520" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
    
    <circle cx="520" cy="520" r="22" fill="url(#socket-grad)"/>
    <circle cx="520" cy="520" r="6" fill="none" opacity="0.3" stroke-width="1.2"/>
  </g>

  <!-- Center Finished Home Wedge Triangles -->
  <g stroke-width="1.5">
    <polygon points="240,240 300,300 240,360" fill="url(#green-grad)" stroke="#14532d"/>
    <polygon points="240,240 300,300 360,240" fill="url(#yellow-grad)" stroke="#78350f"/>
    <polygon points="360,240 300,300 360,360" fill="url(#blue-grad)" stroke="#172554"/>
    <polygon points="240,360 300,300 360,360" fill="url(#red-grad)" stroke="#7f1d1d"/>
  </g>

  <!-- Safe Squares marked with Gilded Star Checkpoints (Hollow Shield) -->
  <!-- Red Start (6, 13) -->
  <use href="#safe-shield" x="240" y="520" stroke="#7f1d1d"/>
  <!-- Green Start (1, 6) -->
  <use href="#safe-shield" x="40" y="240" stroke="#14532d"/>
  <!-- Yellow Start (8, 1) -->
  <use href="#safe-shield" x="320" y="40" stroke="#78350f"/>
  <!-- Blue Start (13, 8) -->
  <use href="#safe-shield" x="520" y="320" stroke="#172554"/>
  
  <!-- Neutral Safe Square 1 (Left block bottom third) (2, 8) -> X=80, Y=320 -->
  <use href="#safe-shield" x="80" y="320" stroke="#14532d"/>
  <!-- Neutral Safe Square 2 (Bottom block right third) (8, 12) -> X=320, Y=480 -->
  <use href="#safe-shield" x="320" y="480" stroke="#7f1d1d"/>
  <!-- Neutral Safe Square 3 (Right block top third) (12, 6) -> X=480, Y=240 -->
  <use href="#safe-shield" x="480" y="240" stroke="#172554"/>
  <!-- Neutral Safe Square 4 (Top block left third) (6, 2) -> X=240, Y=80 -->
  <use href="#safe-shield" x="240" y="80" stroke="#78350f"/>

  <!-- Thick Outer Border Box -->
  <rect x="0" y="0" width="600" height="600" fill="none" stroke="#1e293b" stroke-width="4"/>
</svg>
