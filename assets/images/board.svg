<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <!-- Definitions for Reusable Assets -->
  <defs>
    <!-- Hollow Shield Safe Zone Checkpoint (stroke outline only, fill=none) -->
    <g id="safe-shield">
      <!-- Shadow outline stroke offset -->
      <polygon points="8,7 20,10 32,7 32,20 20,33 8,20" fill="none" stroke="#0f172a" stroke-width="3" stroke-linejoin="round" transform="translate(0, 1.5)" opacity="0.2"/>
      <!-- Crisp solid shield outline -->
      <polygon points="8,7 20,10 32,7 32,20 20,33 8,20" fill="none" stroke="#1e293b" stroke-width="3.2" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- Background Base -->
  <rect x="0" y="0" width="600" height="600" fill="#ffffff" stroke="#1e293b" stroke-width="5"/>

  <!-- Full Track Grid Cells (Restored crisp Slate-800 borders on every single cell) -->
  <g fill="#ffffff" stroke="#1e293b" stroke-width="1.5">
    <rect x="240" y="0" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="0" width="40" height="40" fill="#ffffff"/>
    <rect x="320" y="0" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="40" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="40" width="40" height="40" fill="#ffcc00"/>
    <rect x="320" y="40" width="40" height="40" fill="#ffcc00"/>
    <rect x="240" y="80" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="80" width="40" height="40" fill="#ffcc00"/>
    <rect x="320" y="80" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="120" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="120" width="40" height="40" fill="#ffcc00"/>
    <rect x="320" y="120" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="160" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="160" width="40" height="40" fill="#ffcc00"/>
    <rect x="320" y="160" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="200" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="200" width="40" height="40" fill="#ffcc00"/>
    <rect x="320" y="200" width="40" height="40" fill="#ffffff"/>
    <rect x="0" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="40" y="240" width="40" height="40" fill="#2ecc71"/>
    <rect x="80" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="120" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="160" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="200" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="360" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="400" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="440" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="480" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="520" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="560" y="240" width="40" height="40" fill="#ffffff"/>
    <rect x="0" y="280" width="40" height="40" fill="#ffffff"/>
    <rect x="40" y="280" width="40" height="40" fill="#2ecc71"/>
    <rect x="80" y="280" width="40" height="40" fill="#2ecc71"/>
    <rect x="120" y="280" width="40" height="40" fill="#2ecc71"/>
    <rect x="160" y="280" width="40" height="40" fill="#2ecc71"/>
    <rect x="200" y="280" width="40" height="40" fill="#2ecc71"/>
    <rect x="360" y="280" width="40" height="40" fill="#3b82f6"/>
    <rect x="400" y="280" width="40" height="40" fill="#3b82f6"/>
    <rect x="440" y="280" width="40" height="40" fill="#3b82f6"/>
    <rect x="480" y="280" width="40" height="40" fill="#3b82f6"/>
    <rect x="520" y="280" width="40" height="40" fill="#3b82f6"/>
    <rect x="560" y="280" width="40" height="40" fill="#ffffff"/>
    <rect x="0" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="40" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="80" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="120" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="160" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="200" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="360" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="400" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="440" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="480" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="520" y="320" width="40" height="40" fill="#3b82f6"/>
    <rect x="560" y="320" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="360" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="360" width="40" height="40" fill="#ff4d4d"/>
    <rect x="320" y="360" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="400" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="400" width="40" height="40" fill="#ff4d4d"/>
    <rect x="320" y="400" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="440" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="440" width="40" height="40" fill="#ff4d4d"/>
    <rect x="320" y="440" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="480" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="480" width="40" height="40" fill="#ff4d4d"/>
    <rect x="320" y="480" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="520" width="40" height="40" fill="#ff4d4d"/>
    <rect x="280" y="520" width="40" height="40" fill="#ff4d4d"/>
    <rect x="320" y="520" width="40" height="40" fill="#ffffff"/>
    <rect x="240" y="560" width="40" height="40" fill="#ffffff"/>
    <rect x="280" y="560" width="40" height="40" fill="#ffffff"/>
    <rect x="320" y="560" width="40" height="40" fill="#ffffff"/>
  </g>

  <!-- Player Bases (Home Yards) -->
  <!-- Green Base (Top-Left) -->
  <g stroke="#1e293b" stroke-width="2">
    <rect x="0" y="0" width="240" height="240" fill="#2ecc71" stroke-width="4"/>
    <rect x="20" y="20" width="200" height="200" rx="16" fill="#ffffff" stroke-width="2"/>
    
    <!-- Restored hollow white socket slots -->
    <circle cx="70" cy="70" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="70" cy="70" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="170" cy="70" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="170" cy="70" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="70" cy="170" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="70" cy="170" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="170" cy="170" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="170" cy="170" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>

  <!-- Yellow Base (Top-Right) -->
  <g stroke="#1e293b" stroke-width="2">
    <rect x="360" y="0" width="240" height="240" fill="#ffcc00" stroke-width="4"/>
    <rect x="380" y="20" width="200" height="200" rx="16" fill="#ffffff" stroke-width="2"/>
    
    <circle cx="430" cy="70" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="430" cy="70" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="530" cy="70" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="530" cy="70" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="430" cy="170" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="430" cy="170" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="530" cy="170" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="530" cy="170" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>

  <!-- Red Base (Bottom-Left) -->
  <g stroke="#1e293b" stroke-width="2">
    <rect x="0" y="360" width="240" height="240" fill="#ff4d4d" stroke-width="4"/>
    <rect x="20" y="380" width="200" height="200" rx="16" fill="#ffffff" stroke-width="2"/>
    
    <circle cx="70" cy="430" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="70" cy="430" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="170" cy="430" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="170" cy="430" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="70" cy="530" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="70" cy="530" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="170" cy="530" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="170" cy="530" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>

  <!-- Blue Base (Bottom-Right) -->
  <g stroke="#1e293b" stroke-width="2">
    <rect x="360" y="360" width="240" height="240" fill="#3b82f6" stroke-width="4"/>
    <rect x="380" y="380" width="200" height="200" rx="16" fill="#ffffff" stroke-width="2"/>
    
    <circle cx="430" cy="430" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="430" cy="430" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="530" cy="430" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="530" cy="430" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="430" cy="530" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="430" cy="530" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    
    <circle cx="530" cy="530" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
    <circle cx="530" cy="530" r="6" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
  </g>

  <!-- Center Finished Home Wedge Triangles -->
  <g stroke="#1e293b" stroke-width="2.5">
    <polygon points="240,240 300,300 240,360" fill="#2ecc71"/>
    <polygon points="240,240 300,300 360,240" fill="#ffcc00"/>
    <polygon points="360,240 300,300 360,360" fill="#3b82f6"/>
    <polygon points="240,360 300,300 360,360" fill="#ff4d4d"/>
    
    <!-- Central border frame -->
    <polygon points="240,240 360,240 360,360 240,360" fill="none" stroke-width="4"/>
  </g>

  <!-- Safe Squares marked with Gilded Star Checkpoints (Hollow Shield) -->
  <!-- Red Start (6, 13) -->
  <use href="#safe-shield" x="240" y="520"/>
  <!-- Green Start (1, 6) -->
  <use href="#safe-shield" x="40" y="240"/>
  <!-- Yellow Start (8, 1) -->
  <use href="#safe-shield" x="320" y="40"/>
  <!-- Blue Start (13, 8) -->
  <use href="#safe-shield" x="520" y="320"/>
  
  <!-- Neutral Safe Square 1 (Left block bottom third) (2, 8) -> X=80, Y=320 -->
  <use href="#safe-shield" x="80" y="320"/>
  <!-- Neutral Safe Square 2 (Bottom block right third) (8, 12) -> X=320, Y=480 -->
  <use href="#safe-shield" x="320" y="480"/>
  <!-- Neutral Safe Square 3 (Right block top third) (12, 6) -> X=480, Y=240 -->
  <use href="#safe-shield" x="480" y="240"/>
  <!-- Neutral Safe Square 4 (Top block left third) (6, 2) -> X=240, Y=80 -->
  <use href="#safe-shield" x="240" y="80"/>

  <!-- Thick Outer Border Box -->
  <rect x="0" y="0" width="600" height="600" fill="none" stroke="#1e293b" stroke-width="6"/>
</svg>
